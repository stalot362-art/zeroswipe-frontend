<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rindera</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Rindera</h1>
    <p>One match. Real intention. No swiping.</p>

    <div class="card">
      <label>Your name</label>
      <input id="name-input" type="text" placeholder="Enter your name" />

      <button id="register-btn">Enter Rindera</button>
      <button id="find-match-btn" disabled>Find Match</button>

      <div id="match-actions" class="hidden">
        <h2 id="match-title">Match found</h2>

        <button id="video-date-btn">Video Date</button>
        <button id="game-date-btn">Game Date</button>

        <input id="schedule-input" type="datetime-local" />
        <button id="schedule-date-btn">Schedule Date</button>
      </div>

      <div id="match-history" class="hidden">
        <h2>Match History</h2>
        <div id="match-history-list"></div>
      </div>

      <div id="request-box" class="hidden">
        <p id="request-text"></p>
        <button id="accept-request-btn">Accept</button>
      </div>

      <div id="status-box"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
