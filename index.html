<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>ZeroSwipe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background glow -->
  <div class="bg-glow"><div class="bg-glow-inner"></div></div>

  <!-- Main container -->
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1 class="logo">Zero<span>Swipe</span></h1>
      <p class="tagline">One match. Real intention. <em>No swiping. No endless options.</em></p>
    </div>

    <!-- Card -->
    <div class="card">

      <!-- Video section (hidden until in call) -->
      <div id="video-section" class="video-section hidden">
        <div class="video-grid">
          <!-- Local video -->
          <div class="video-tile">
            <video id="local-video" autoplay playsinline muted></video>
            <div class="video-label">You</div>
            <div id="live-badge" class="live-badge hidden">
              <div class="live-dot"></div>
              <span class="live-text">LIVE</span>
            </div>
          </div>
          <!-- Remote video -->
          <div class="video-tile">
            <video id="remote-video" autoplay playsinline style="opacity:0"></video>
            <div id="remote-spinner" class="remote-spinner">
              <div class="spinner-sm"></div>
              <span>Connecting…</span>
            </div>
            <div class="video-label">Partner</div>
          </div>
        </div>
        <p id="call-status" class="call-status-text hidden"></p>
        <button id="end-call-btn" class="btn btn-danger">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"/>
          </svg>
          End Call
        </button>
        <div class="divider-full"></div>
      </div>

      <!-- User ID -->
      <div class="input-section">
        <label class="input-label" for="user-id-input">User ID</label>
        <input id="user-id-input" class="user-input" type="text" placeholder="Enter your user ID" autocomplete="off" />
      </div>

      <div class="divider"></div>

      <!-- Actions -->
      <div class="actions">

        <!-- Create User -->
        <button id="create-user-btn" class="btn btn-default">Create User</button>

        <!-- Get Match / Searching -->
        <button id="get-match-btn" class="btn btn-default">Get Match</button>
        <div id="searching-indicator" class="searching-indicator hidden">
          <div class="searching-pill">
            <div class="spinner-violet"></div>
            <span>Searching for a match…</span>
          </div>
          <button id="cancel-search-btn" class="cancel-link">Cancel search</button>
        </div>

        <!-- Unmatch -->
        <button id="unmatch-btn" class="btn btn-default">Unmatch</button>

        <!-- Pay $1 (hidden until required) -->
        <button id="pay-btn" class="btn btn-amber hidden">Pay $1</button>

      </div>
    </div>

    <!-- Status banner -->
    <div id="status-banner" class="status-banner hidden"></div>

    <!-- Footer -->
    <p class="footer">zeroswipe-backend.onrender.com</p>
  </div>

  <!-- Unmatch confirmation modal -->
  <div id="unmatch-modal" class="modal-overlay hidden">
    <div class="modal-box" id="modal-box">
      <div class="modal-icon-wrap">
        <div class="modal-icon">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:#fb923c">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
          </svg>
        </div>
      </div>
      <div class="modal-text">
        <h2>Are you sure?</h2>
        <p>A few more minutes could change everything. Give this conversation a real chance before deciding.</p>
      </div>
      <div class="modal-actions">
        <button id="modal-stay-btn" class="btn btn-violet">Stay a little longer</button>
        <button id="modal-unmatch-btn" class="btn btn-ghost-danger">Continue to Unmatch ($1)</button>
      </div>
    </div>
  </div>

  <!-- Dependencies -->
  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
  <script src="https://js.paystack.co/v2/inline.js"></script>
  <script src="script.js"></script>
</body>
</html>
